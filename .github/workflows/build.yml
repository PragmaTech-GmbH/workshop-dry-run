name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build and run setup-verification tests with Maven
      run: ./mvnw verify --batch-mode --no-transfer-progress -Dmaven.test.redirectTestOutputToFile=true

    - name: Display test output on failure
      if: failure()
      run: |
        find . -name "*.txt" -path "*/surefire-reports/*" -exec echo "=== {} ===" \; -exec cat {} \;
        find . -name "*.txt" -path "*/failsafe-reports/*" -exec echo "=== {} ===" \; -exec cat {} \;
