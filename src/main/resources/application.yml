spring:
  application:
    name: workshop-dry-run
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/test-realm}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Book Metadata API (OpenLibrary)
book:
  metadata:
    api:
      url: https://openlibrary.org
      timeout: 15

bookshelf:
  notification:
    from: library@example.com
    deletion-recipient: librarian@example.com
